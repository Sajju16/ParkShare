version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parkshare_postgres
    environment:
      POSTGRES_USER: parkshare_user
      POSTGRES_PASSWORD: parkshare_password
      POSTGRES_DB: parkshare_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
