spring:
  application:
    name: ParkShare
  datasource:
    url: jdbc:h2:mem:parkshare_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expirationMs: 86400000 # 24 hours
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dummy_cloud}
    api-key: ${CLOUDINARY_API_KEY:dummy_key}
    api-secret: ${CLOUDINARY_API_SECRET:dummy_secret}
